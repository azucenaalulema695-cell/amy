<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Amy</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background:linear-gradient(135deg,#ffecd2,#fcb69f);
text-align:center;
}

.caja{
background:white;
padding:50px;
border-radius:20px;
max-width:600px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{color:#ef6c00;}

p{color:#444;font-size:18px;line-height:1.6;}

</style>
</head>

<body>

<div class="caja">

<h1>🌸 Amy 🌸</h1>

<p>
Tu valentía y tu determinación muestran
la mujer fuerte que eres.
</p>

<p>
Sigue creyendo en ti misma,
porque tienes el potencial de lograr
todo lo que te propongas.
</p>

<p><b>Feliz Día de la Mujer ✨</b></p>

</div>

</body>
</html>
